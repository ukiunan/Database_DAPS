<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPS 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0061ff; --s: #10b981; --w: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #1e293b; }
        
        .header { width: 100%; background: #fff; padding: 25px 0; text-align: center; border-bottom: 1px solid #e2e8f0; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 800; color: var(--p); letter-spacing: -0.5px; }
        .session-badge { background: #eff6ff; color: var(--p); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 8px; display: inline-block; text-transform: uppercase; }

        .scanner-container { width: 90%; max-width: 400px; position: relative; }
        #canvas { width: 100%; border-radius: 30px; background: #000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); display: none; }
        
        .btn-start { background: var(--p); color: white; border: none; padding: 20px 40px; border-radius: 20px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,97,255,0.2); }
        .btn-start:active { transform: scale(0.95); }

        /* Elegant Notifications */
        #notif { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; padding: 20px; border-radius: 24px; display: none; text-align: center; animation: slideUp 0.4s ease; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .notif-success { background: white; border-left: 6px solid var(--s); }
        .notif-warning { background: white; border-left: 6px solid var(--w); }
        .notif-error { background: white; border-left: 6px solid #ef4444; }

        @keyframes slideUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--p); box-shadow: 0 0 15px var(--p); animation: scan 2s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div class="header">
    <h1>DAPS 2026</h1>
    <div id="sessionInfo" class="session-badge">Memuat Sesi...</div>
</div>

<div class="scanner-container">
    <button id="startBtn" class="btn-start" onclick="startScanner()">BUKA KAMERA SCANNER</button>
    <div id="scanLine" class="scan-line"></div>
    <canvas id="canvas"></canvas>
</div>

<div id="notif">
    <div id="n-icon" style="font-size: 30px; margin-bottom: 5px;"></div>
    <div id="n-name" style="font-weight: 800; font-size: 18px;"></div>
    <div id="n-sub" style="font-size: 13px; color: #64748b;"></div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwIyAO2_Km0JFSGY1cQQh9D3Nga9qXm3nSqoPFNkbbTGNvO4X3QMckdA36ndN3OZV5fXQ/exec"; // GANTI INI
    const video = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const notif = document.getElementById("notif");

    // Ambil info sesi dari database saat buka apps
    fetch(API_URL).then(r => r.json()).then(data => {
        document.getElementById('sessionInfo').innerText = "HARI " + data.hari + " • " + data.sesi;
    });

    function startScanner() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('scanLine').style.display = 'block';
        canvasElement.style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            
            if (code) {
                document.getElementById('beep').play();
                processScan(code.data);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    function processScan(id) {
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ id: id })
        }).then(() => {
            // Karena no-cors, kita tidak bisa baca respons detail, 
            // tapi kita beri feedback visual bahwa data terkirim.
            showNotif("success", "ID: " + id, "Data Berhasil Terkirim ke Database");
            setTimeout(() => { 
                notif.style.display = "none"; 
                requestAnimationFrame(tick); 
            }, 2500);
        });
    }

    function showNotif(type, title, sub) {
        notif.style.display = "block";
        notif.className = "notif-" + type;
        document.getElementById('n-icon').innerText = type === "success" ? "✓" : "!";
        document.getElementById('n-name').innerText = title;
        document.getElementById('n-sub').innerText = sub;
    }
</script>

</body>
</html>
