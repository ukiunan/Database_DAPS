<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAPS 2026 | Premium Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #0f172a; --primary: #2563eb; --success: #059669; 
            --warning: #d97706; --error: #dc2626; --bg: #ffffff; --surface: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; color: var(--accent); overflow: hidden;
        }
        .nav-bar { width: 100%; max-width: 500px; padding: 30px 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar h1 { margin: 0; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .session-info { width: 90%; max-width: 400px; background: var(--surface); padding: 20px; border-radius: 24px; text-align: center; margin-bottom: 30px; border: 1px solid #f1f5f9; }
        .session-info h2 { margin: 0; font-size: 18px; font-weight: 700; }

        .camera-wrapper { width: 90%; max-width: 380px; position: relative; border-radius: 40px; overflow: hidden; aspect-ratio: 1/1; background: #000; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1); }
        #canvas { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
        
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px 32px; border-radius: 100px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 1px; }

        #notif { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; padding: 24px; border-radius: 30px; 
            display: none; text-align: center; z-index: 100; background: white; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12); border-bottom: 6px solid var(--accent);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="loading-bar"></div>
    <div class="nav-bar"><h1>DAPS 2026</h1><div style="display:flex;align-items:center;font-size:11px;font-weight:700;"><div class="dot"></div> LIVE</div></div>
    <div class="session-info"><h2 id="sessionVal">Menghubungkan...</h2></div>
    <div class="camera-wrapper">
        <div id="placeholder" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;">
            <p style="font-size:14px;color:#64748b;margin-bottom:20px;">Siap memproses absensi santri secara otomatis.</p>
            <button class="btn-action" onclick="startScanner()">AKTIFKAN KAMERA</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>
    <div id="notif">
        <div id="n-icon" style="font-size:30px;margin-bottom:10px;"></div>
        <div id="n-title" style="font-weight:800;font-size:18px;"></div>
        <div id="n-sub" style="font-size:13px;color:#64748b;"></div>
    </div>
    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwIyAO2_Km0JFSGY1cQQh9D3Nga9qXm3nSqoPFNkbbTGNvO4X3QMckdA36ndN3OZV5fXQ/exec"; 
    const video = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const notif = document.getElementById("notif");
    const loader = document.getElementById("loading-bar");
    let isProcessing = false;

    fetch(API_URL).then(r => r.json()).then(data => {
        document.getElementById('sessionVal').innerText = "HARI " + data.hari + " • " + data.sesi;
    });

    function startScanner() {
        document.getElementById('placeholder').style.display = 'none';
        canvasElement.style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            if (code) {
                isProcessing = true;
                document.getElementById('beep').play();
                processScan(code.data);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    async function processScan(id) {
        loader.style.width = '70%';
        try {
            // Mengirim ID via Parameter URL agar tidak diblokir CORS
            const target = `${API_URL}?id=${encodeURIComponent(id)}`;
            const response = await fetch(target);
            const result = await response.json();
            showNotif(result.status, result.title, result.sub);
        } catch (error) {
            showNotif("error", "Koneksi Bermasalah", "Data gagal dikirim ke server");
        }
        loader.style.width = '100%';
        setTimeout(() => { 
            loader.style.width = '0%'; notif.style.display = "none"; 
            isProcessing = false; requestAnimationFrame(tick); 
        }, 3000);
    }

    function showNotif(type, title, sub) {
        notif.style.display = "block";
        notif.style.borderBottomColor = `var(--${type})`;
        document.getElementById('n-icon').innerText = type === "success" ? "✦" : (type === "warning" ? "◈" : "✕");
        document.getElementById('n-title').innerText = title;
        document.getElementById('n-sub').innerText = sub;
    }
</script>
</body>
</html>
