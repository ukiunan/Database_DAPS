<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAPS 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; --s: #10b981; --w: #f59e0b; --e: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; padding: 20px 0; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .session-badge { background: #eff6ff; color: var(--p); padding: 8px 15px; border-radius: 50px; font-size: 11px; font-weight: 700; margin-top: 10px; display: inline-block; }
        
        /* Kamera - Normal (Tidak Terbalik) */
        #canvas { width: 90%; max-width: 380px; border-radius: 30px; background: #000; margin-top: 20px; display: none; border: 5px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .btn-start { background: #0f172a; color: white; border: none; padding: 20px 40px; border-radius: 20px; font-weight: 700; width: 90%; margin-top: 30px; cursor: pointer; }

        #notif { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 300px; padding: 30px; border-radius: 40px; display: none; text-align: center; z-index: 100; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .notif-success { background: #f0fdf4; border: 3px solid var(--s); color: #064e3b; }
        .notif-warning { background: #fffbeb; border: 3px solid var(--w); color: #78350f; }
        .notif-terlambat { background: #fef2f2; border: 3px solid var(--e); color: #7f1d1d; }
        .notif-error { background: #f8fafc; border: 3px solid #64748b; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 18px; color: var(--p); margin: 0;">DAPS 2026</h1>
    <div id="sessionInfo" class="session-badge">Sinkronisasi...</div>
</div>

<canvas id="canvas"></canvas>
<button id="startBtn" class="btn-start" onclick="startScanner()">BUKA KAMERA SCANNER</button>

<div id="notif">
    <div id="n-icon" style="font-size: 40px; margin-bottom: 10px;"></div>
    <div id="n-title" style="font-weight: 800; font-size: 18px;"></div>
    <div id="n-sub" style="font-size: 13px; opacity: 0.8;"></div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxJgAmt74RBOEJ3ZqOMCa7QSaZkISK0ACJGMuaKvFz0cLFgc_JCFhGuhUktCsBK91xDtQ/exec"; 
    const video = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const notif = document.getElementById("notif");
    let isProcessing = false;

    fetch(API_URL).then(r => r.json()).then(data => {
        document.getElementById('sessionInfo').innerText = "HARI " + data.hari + " • " + data.sesi;
    });

    function startScanner() {
        document.getElementById('startBtn').style.display = 'none';
        canvasElement.style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            if (code) {
                isProcessing = true;
                document.getElementById('beep').play();
                processScan(code.data);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    async function processScan(id) {
        try {
            const response = await fetch(`${API_URL}?id=${encodeURIComponent(id)}`);
            const result = await response.json();
            showNotif(result.status, result.title, result.sub);
        } catch (e) {
            showNotif("error", "KONEKSI GAGAL", "Cek internet Anda");
        }
        setTimeout(() => { 
            notif.style.display = "none"; 
            isProcessing = false;
            requestAnimationFrame(tick); 
        }, 3000);
    }

    function showNotif(type, title, sub) {
        notif.style.display = "block";
        notif.className = "notif-" + type;
        const icons = { success: "✓", warning: "!", terlambat: "✕", error: "✕" };
        document.getElementById('n-icon').innerText = icons[type] || "!";
        document.getElementById('n-title').innerText = title;
        document.getElementById('n-sub').innerText = sub;
    }
</script>
</body>
</html>
