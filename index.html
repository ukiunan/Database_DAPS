<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPS 2026 - RARM</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; }
        #canvas { width: 100%; border-radius: 15px; margin-top: 15px; display: none; background: #000; }
        .btn { background: #0061ff; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; color: white; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#0061ff">DAPS 2026</h2>
        <select id="hari"><option value="1">Hari 1</option><option value="2">Hari 2</option><option value="3">Hari 3</option></select>
        <select id="sesi">
            <option value="Tahajjud">Tahajjud</option><option value="Shubuh">Shubuh</option>
            <option value="Olahraga">Olahraga</option><option value="Materi 1">Materi 1</option>
        </select>
        <button class="btn" id="startBtn" onclick="init()">AKTIFKAN KAMERA</button>
        <canvas id="canvas"></canvas>
    </div>
    <div id="overlay">BERHASIL! ✓</div>
    <script>
        const video = document.createElement("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d");

        function init() {
            document.getElementById('startBtn').style.display = 'none';
            canvasElement.style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                if (code) {
                    sendData(code.data);
                    return;
                }
            }
            requestAnimationFrame(tick);
        }

        function sendData(id) {
            // GANTI URL DI BAWAH INI DENGAN URL WEB APP ANDA
            const webAppUrl = "https://script.google.com/macros/s/AKfycbwIyAO2_Km0JFSGY1cQQh9D3Nga9qXm3nSqoPFNkbbTGNvO4X3QMckdA36ndN3OZV5fXQ/exec";
            
            const payload = {
                id: id,
                sesi: document.getElementById('sesi').value,
                hari: document.getElementById('hari').value
            };

            fetch(webAppUrl, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                document.getElementById('overlay').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    requestAnimationFrame(tick);
                }, 1500);
            });
        }
    </script>
</body>
</html>
