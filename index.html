<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAPS 2026 | Portal Presensi</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; --s: #10b981; --w: #f59e0b; --e: #ef4444; --bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #1e293b; overflow: hidden; }
        
        .header { width: 100%; background: #fff; padding: 25px 0; text-align: center; border-bottom: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--p); letter-spacing: 1px; }
        .session-badge { background: #eff6ff; color: var(--p); padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: 700; margin-top: 10px; display: inline-block; text-transform: uppercase; border: 1px solid #dbeafe; }

        .scanner-container { width: 90%; max-width: 400px; position: relative; margin-top: 30px; }
        #canvas { width: 100%; border-radius: 35px; background: #000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); display: none; transform: scaleX(-1); border: 6px solid white; }
        
        .btn-start { background: #0f172a; color: white; border: none; padding: 20px 40px; border-radius: 20px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; width: 100%; letter-spacing: 1px; }

        /* Color Based Notifications */
        #notif { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; padding: 35px 25px; border-radius: 40px; display: none; text-align: center; z-index: 100; box-shadow: 0 30px 60px rgba(0,0,0,0.15); }
        .notif-success { background: #f0fdf4; border: 2px solid var(--s); color: #064e3b; } /* Hijau */
        .notif-warning { background: #fffbeb; border: 2px solid var(--w); color: #78350f; } /* Kuning */
        .notif-terlambat { background: #fef2f2; border: 2px solid var(--e); color: #7f1d1d; } /* Merah */
        .notif-error { background: #f8fafc; border: 2px solid #64748b; color: #1e293b; }

        #n-icon { font-size: 40px; margin-bottom: 15px; }
        #n-title { font-weight: 800; font-size: 20px; line-height: 1.2; }
        #n-sub { font-size: 14px; margin-top: 8px; opacity: 0.8; font-weight: 500; }

        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--p); box-shadow: 0 0 15px var(--p); animation: scan 2s infinite linear; display: none; z-index: 10; }
        @keyframes scan { 0% { top: 5%; } 100% { top: 95%; } }
        #loading { position: fixed; bottom: 30px; font-size: 12px; font-weight: 700; color: #94a3b8; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>DAPS 2026</h1>
    <div id="sessionInfo" class="session-badge">Syncing System...</div>
</div>

<div class="scanner-container">
    <button id="startBtn" class="btn-start" onclick="startScanner()">BUKA SCANNER PRESENSI</button>
    <div id="scanLine" class="scan-line"></div>
    <canvas id="canvas"></canvas>
</div>

<div id="loading">MENGIRIM DATA KE CLOUD...</div>

<div id="notif">
    <div id="n-icon"></div>
    <div id="n-title"></div>
    <div id="n-sub"></div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwIyAO2_Km0JFSGY1cQQh9D3Nga9qXm3nSqoPFNkbbTGNvO4X3QMckdA36ndN3OZV5fXQ/exec"; 
    
    const video = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const notif = document.getElementById("notif");
    let isProcessing = false;

    fetch(API_URL).then(r => r.json()).then(data => {
        document.getElementById('sessionInfo').innerText = "HARI " + data.hari + " • " + data.sesi;
    });

    function startScanner() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('scanLine').style.display = 'block';
        canvasElement.style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            
            if (code) {
                isProcessing = true;
                document.getElementById('beep').play();
                processScan(code.data);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    async function processScan(id) {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(`${API_URL}?id=${encodeURIComponent(id)}`);
            const result = await response.json();
            showNotif(result.status, result.title, result.sub);
        } catch (error) {
            showNotif("error", "KONEKSI GAGAL", "Data gagal dikirim ke server");
        }
        document.getElementById('loading').style.display = 'none';
        setTimeout(() => { 
            notif.style.display = "none"; 
            isProcessing = false;
            requestAnimationFrame(tick); 
        }, 3500);
    }

    function showNotif(type, title, sub) {
        notif.style.display = "block";
        notif.className = "notif-" + type;
        const icons = { success: "✦", warning: "◈", terlambat: "✕", error: "✕" };
        document.getElementById('n-icon').innerText = icons[type] || "!";
        document.getElementById('n-title').innerText = title;
        document.getElementById('n-sub').innerText = sub;
    }
</script>
</body>
</html>
